name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-policy:
    name: Repository policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Audit tracked files
        run: python scripts/check_repository.py

      - name: Test repository audit
        run: python -m unittest scripts.test_check_repository

      - name: Validate branch and commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BRANCH_NAME: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: >-
          python scripts/check_conventions.py
          --branch "$BRANCH_NAME"
          --base "$BASE_SHA"
          --head "$HEAD_SHA"
          --title "$PR_TITLE"

      - name: Validate main commit
        if: github.event_name == 'push'
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: >-
          python scripts/check_conventions.py
          --branch main
          --commit "$COMMIT_SHA"
